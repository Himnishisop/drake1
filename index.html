function log(x){

function addMemory(info){

  const updated = (old + "\n- " + info).trim();
  localStorage.setItem("DRAKE_MEMORY", updated);
  return updated;
}

async function joinMainDrake(){
  if(conference){
    log("Already joined");
    return;
  }

  if(!JWT_TOKEN || JWT_TOKEN.includes("PASTE")){
    log("Paste JaaS JWT first");
    setStatus("missing JWT");
    return;
  }

  JitsiMeetJS.init({ disableAudioLevels:false });
  JitsiMeetJS.setLogLevel(JitsiMeetJS.logLevels.ERROR);

  connection = new JitsiMeetJS.JitsiConnection(null, JWT_TOKEN, buildOptions());

  connection.addEventListener(
    JitsiMeetJS.events.connection.CONNECTION_ESTABLISHED,
    onConnectionSuccess
  );

  connection.addEventListener(
    JitsiMeetJS.events.connection.CONNECTION_FAILED,
    err => log("Connection failed: " + err)
  );

  connection.addEventListener(
    JitsiMeetJS.events.connection.CONNECTION_DISCONNECTED,
    () => log("Connection disconnected")
  );

  connection.connect();
  log("Connecting Drake...");
  setStatus("connecting");
}

async function onConnectionSuccess(){
  log("Connection established ✅");

  conference = connection.initJitsiConference(ROOM, { openBridgeChannel:true });

  conference.on(
    JitsiMeetJS.events.conference.CONFERENCE_JOINED,
    async () => {
      log("Conference joined ✅");
      setStatus("joined, waiting second phone");
      await setupSilentTTSInjection();
    }
  );

  conference.on(
    JitsiMeetJS.events.conference.USER_JOINED,
    id => log("Second phone/user joined ✅ " + id)
  );

  conference.on(
    JitsiMeetJS.events.conference.USER_LEFT,
    id => log("User left " + id)
  );

  conference.on(
    JitsiMeetJS.events.conference.TRACK_ADDED,
    onTrackAdded
  );

  conference.on(
    JitsiMeetJS.events.conference.TRACK_REMOVED,
    track => {
      if(!track.isLocal() && track.getType() === "audio"){
        log("Remote audio track removed");
        remoteAudioStream = null;
      }
    }
  );

  conference.join();

  try{
    localTracks = await JitsiMeetJS.createLocalTracks({ devices:["audio"] });

    for(const track of localTracks){
      localAudioTrack = track;
      await conference.addTrack(track);
      log("Local Drake track added");
    }
  }catch(e){
    log("Local track error: " + e);
  }
}

async function onTrackAdded(track){
  if(track.isLocal()) return;
  if(track.getType() !== "audio") return;

  log("New remote audio track received ✅");

  autoRestartWake = running;

  await stopWakeOnly();

  // remove old hidden audio sinks
  remoteAudioEls.forEach(el => {
    try{
      track.detach(el);
      el.pause();
      el.srcObject = null;
      el.remove();
    }catch(e){}
  });

  remoteAudioEls = [];

  // hidden audio only, no UI controls
  const audio = document.createElement("audio");
  audio.autoplay = true;
  audio.playsInline = true;
  audio.muted = true;
  audio.style.display = "none";

  document.body.appendChild(audio);
  remoteAudioEls.push(audio);

  track.attach(audio);

  if(typeof track.getOriginalStream === "function"){
    remoteAudioStream = track.getOriginalStream();
  }else{
    remoteAudioStream = new MediaStream([track.getTrack()]);
  }

  log("Second phone mic captured ✅");
  setStatus("remote audio ready");

  if(autoRestartWake){
    autoRestartWake = false;
    setTimeout(() => {
      log("Restarting wake listener on newest mic...");
      startDrake();
    }, 1000);
  }
}

async function setupSilentTTSInjection(){
  if(!localAudioTrack){
    setTimeout(setupSilentTTSInjection, 500);
    return;
  }

  ttsCtx = new AudioContext();
  ttsDestination = ttsCtx.createMediaStreamDestination();

  const osc = ttsCtx.createOscillator();
  const gain = ttsCtx.createGain();
  gain.gain.value = 0;

  osc.connect(gain);
  gain.connect(ttsDestination);
  osc.start();

  const effect = {
    isEnabled: () => true,
    startEffect: () => ttsDestination.stream,
    stopEffect: () => {}
  };

  await localAudioTrack.setEffect(effect);
  log("Voice injection ready ✅");
}

async function playInjectedTTS(text){
  try{
    aiBusy = true;
    setStatus("speaking");
    log("DRAKE -> " + text);

    const audio = await puter.ai.txt2speech(text);
    const url = audio.src || audio.currentSrc;

    const res = await fetch(url);
    const arrayBuffer = await res.arrayBuffer();
    const audioBuffer = await ttsCtx.decodeAudioData(arrayBuffer);

    const src = ttsCtx.createBufferSource();
    src.buffer = audioBuffer;
    src.connect(ttsDestination);

    src.onended = () => {
      aiBusy = false;
      setStatus("listening for Drake");
    };

    src.start();
  }catch(e){
    aiBusy = false;
    log("TTS error: " + e);
  }
}

async function startDrake(){
  if(running){
    log("Already running");
    return;
  }

  if(!remoteAudioStream){
    log("No second phone audio");
    return;
  }

  if(!model){
    log("Loading wake model...");
    const startTime = Date.now();
    model = await Vosk.createModel("model.tar.gz");
    log("Wake model loaded in " + Math.round((Date.now() - startTime) / 1000) + " sec ✅");
  }

  recognizer = new model.KaldiRecognizer(16000);

  recognizer.on("partialresult", msg => {
    if(aiBusy) return;
    const t = (msg.result.partial || "").toLowerCase().trim();
    if(t && hasWake(t)) onWakeDetected();
  });

  recognizer.on("result", msg => {
    if(aiBusy) return;
    const t = (msg.result.text || "").toLowerCase().trim();
    if(t && hasWake(t)) onWakeDetected();
  });

  wakeCtx = new AudioContext();
  wakeSource = wakeCtx.createMediaStreamSource(remoteAudioStream);
  wakeNode = wakeCtx.createScriptProcessor(4096,1,1);

  wakeNode.onaudioprocess = e => {
    if(running && recognizer && !aiBusy){
      recognizer.acceptWaveform(e.inputBuffer);
    }
  };

  wakeSource.connect(wakeNode);

  const silentGain = wakeCtx.createGain();
  silentGain.gain.value = 0;
  wakeNode.connect(silentGain);
  silentGain.connect(wakeCtx.destination);

  running = true;
  log("Wake detection active ✅");
  setStatus("Listening for Drake");
}

function hasWake(t){
  return WAKE_WORDS.some(w => t.includes(w));
}

function onWakeDetected(){
  const now = Date.now();
  if(now - lastWake < 6000) return;

  lastWake = now;
  aiBusy = true;
  setWake(true);
  log("WAKE DETECTED ✅");

  setTimeout(handleCommandAfterWake, 300);
}

async function handleCommandAfterWake(){
  try{
    await playInjectedTTS("Yes?");
    await wait(900);

    log("Recording command...");

    const blob = await recordAudio(remoteAudioStream, 5500);

    log("Sending command to Puter STT...");

    let text = "";

    try{
      const audioBlob = new Blob([blob], {type:"audio/webm"});

      const result = await Promise.race([
        puter.ai.speech2txt(audioBlob, { model:"gpt-4o-transcribe" }),
        wait(25000).then(() => { throw new Error("Puter STT timeout"); })
      ]);

      text = String(result.text || result || "").trim();
    }catch(e){
      log("Puter STT error: " + e);
      await playInjectedTTS("I could not transcribe that.");
      setWake(false);
      return;
    }

    log("COMMAND -> " + text);

    if(!text){
      await playInjectedTTS("I did not catch that.");
      setWake(false);
      return;
    }

    await askMistral(text);
    setWake(false);
  }catch(e){
    log("Command error: " + e);
  }
}

function recordAudio(stream,ms){
  return new Promise((resolve,reject) => {
    const chunks = [];
    let mime = "audio/webm;codecs=opus";

    if(!MediaRecorder.isTypeSupported(mime)){
      mime = "audio/webm";
    }

    const audioOnly = new MediaStream(stream.getAudioTracks());
    const rec = new MediaRecorder(audioOnly, {mimeType:mime});

    rec.ondataavailable = e => {
      if(e.data && e.data.size > 0) chunks.push(e.data);
    };

    rec.onerror = e => reject(e.error);

    rec.onstop = () => {
      resolve(new Blob(chunks, {type:mime}));
    };

    rec.start();

    setTimeout(() => {
      if(rec.state !== "inactive") rec.stop();
    }, ms);
  });
}

async function askMistral(userText){
  try{
    setStatus("thinking");
    log("ASK -> " + userText);

    const res = await fetch("https://api.mistral.ai/v1/chat/completions", {
      method:"POST",
      headers:{
        "Authorization":"Bearer " + MISTRAL_API_KEY,
        "Content-Type":"application/json"
      },
      body:JSON.stringify({
        model:"mistral-large-latest",
        messages:[
          {role:"system", content:buildSystemPrompt()},
          {role:"user", content:userText}
        ],
        temperature:0.25
      })
    });

    const data = await res.json();

    let raw = data?.choices?.[0]?.message?.content || "{}";
    raw = raw.replace(/```json/gi,"").replace(/```/g,"").trim();

    log("AI JSON -> " + raw);

    const obj = JSON.parse(raw);
    await handleAI(obj);
  }catch(e){
    log("AI fail: " + e);
    await playInjectedTTS("Something went wrong.");
  }
}

async function handleAI(obj){
  if(obj.type === "answer"){
    await playInjectedTTS(obj.response || "Okay.");
    return;
  }

  if(obj.type === "remember"){
    addMemory(obj.memory);
    await playInjectedTTS(obj.response || "I will remember that.");
    return;
  }

  if(obj.type === "music"){
    if(obj.action === "play") await playMusic(obj.query);
    if(obj.action === "pause") pauseMusic();
    if(obj.action === "resume") resumeMusic();
    if(obj.action === "stop") stopMusic();
    return;
  }

  if(obj.type === "weather"){
    await getWeather(obj.location || "Mumbai");
    return;
  }

  await playInjectedTTS("I could not handle that.");
}

async function getWeather(location){
  try{
    const geo = await fetch(
      "https://geocoding-api.open-meteo.com/v1/search?count=1&name=" +
      encodeURIComponent(location)
    ).then(r => r.json());

    const place = geo.results?.[0];

    if(!place){
      await playInjectedTTS("I could not find that location.");
      return;
    }

    const weather = await fetch(
      `https://api.open-meteo.com/v1/forecast?latitude=${place.latitude}&longitude=${place.longitude}&current=temperature_2m,relative_humidity_2m,wind_speed_10m`
    ).then(r => r.json());

    const c = weather.current;

    await playInjectedTTS(
      `Weather in ${place.name}: ${Math.round(c.temperature_2m)} degrees, humidity ${c.relative_humidity_2m} percent, wind ${Math.round(c.wind_speed_10m)} kilometers per hour.`
    );
  }catch(e){
    log("Weather error: " + e);
  }
}

async function searchYouTubeVideo(query){
  const url =
    "https://www.googleapis.com/youtube/v3/search" +
    "?part=snippet&type=video&maxResults=1&q=" +
    encodeURIComponent(query) +
    "&key=" + encodeURIComponent(YT_API_KEY);

  const res = await fetch(url);
  const data = await res.json();
  const item = data.items && data.items[0];

  return {
    videoId:item.id.videoId,
    title:item.snippet?.title || "Unknown"
  };
}

async function playMusic(query){
  try{
    if(!ytReady || !ytPlayer){
      log("YouTube not ready");
      return;
    }

    const result = await searchYouTubeVideo(query);

    lastVideoId = result.videoId;

    ytPlayer.loadVideoById(result.videoId);
    ytPlayer.playVideo();

    log(`PLAYING -> ${result.title}`);
    setStatus("Playing music");
  }catch(e){
    log("YT error: " + e);
  }
}

function pauseMusic(){
  if(ytPlayer && ytReady){
    ytPlayer.pauseVideo();
    log("Music paused");
  }
}

function resumeMusic(){
  if(ytPlayer && ytReady){
    ytPlayer.playVideo();
    log("Music resumed");
  }
}

function stopMusic(){
  if(ytPlayer && ytReady){
    ytPlayer.stopVideo();
    log("Music stopped");
  }
}

async function stopWakeOnly(){
  running = false;
  aiBusy = false;

  try{
    if(wakeNode) wakeNode.disconnect();
    if(wakeSource) wakeSource.disconnect();
    if(wakeCtx) await wakeCtx.close();
    if(recognizer) recognizer.remove();
  }catch(e){}

  wakeNode = null;
  wakeSource = null;
  wakeCtx = null;
  recognizer = null;

  setWake(false);
}

async function stopDrake(){
  await stopWakeOnly();
  setStatus("stopped");
  log("Drake stopped");
}

function wait(ms){
  return new Promise(r => setTimeout(r,ms));
}
